<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/main.css">
    <title>To-Do</title>
</head>
<body>
    <div class="navbar-wrapper">
        <div class="navbar">
            <a href="../index.html" class="navbar-link">Home</a>
            <a href="todo.html" class="navbar-link">To-Do</a>
            <a href="calendar.html" class="navbar-link">Calendar</a>
        </div>
    </div>

    <div class="todo-container">
        <!-- todo content -->
         <h1>To-Do</h1>
         
        
         <div class="todo-main">

            <div class="todo-create-task">
                <h4>Create Task</h4>
                <input type="text" placeholder="task..." class="taskInput">
                <div class="priorityContainer">
                    Priority: 
                    <button class="priorityButton">!</button>
                </div>
                <button class="createTaskButton">Add Task</button>
            </div>

            <div class="todo-list-container">
                <ul class="todo-list">
                </ul>
            </div>

            

         </div>

    </div>
    <script src="../assets/js/todo.js"></script>
</body>
</html>
